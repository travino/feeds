# Feed registry — single source of truth for the travino/feeds project.
# Each entry maps a key to its generator script, fetch type, and source URL.

feeds:
  jbzd:
    script: jbzd_blog.py
    type: requests
    blog_url: https://jbzd.com.pl/
    format: atom
    output: feeds/feed_jbzd.xml
    cache: feeds/.cache/jbzd.json   # rolling archive; commit this to persist history
    max_entries: 300
